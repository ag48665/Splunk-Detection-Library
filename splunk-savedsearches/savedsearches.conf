[DET-001 - Brute Force Failed Logons]
search = index=main EventCode=4625 | stats count by TargetUserName, src_ip, host | where count>=5
cron_schedule = */15 * * * *
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
severity = 4

[DET-003 - Success After Failures]
search = index=main (EventCode=4625 OR EventCode=4624) | eval action=if(EventCode=4625,"failure","success") | stats count(eval(action="failure")) as failures count(eval(action="success")) as successes by TargetUserName, src_ip, host | where failures>=5 AND successes>=1
cron_schedule = */15 * * * *
severity = 5
